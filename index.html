<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 대화창 변환기</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- PDF.js 라이브러리 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <!-- 이미지(PNG) 저장 라이브러리 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <div class="app-container">
        <header class="app-header">
            <h1>💬 PDF 댓글/대화 변환기</h1>
            <p>PDF를 업로드하면 자동으로 대화 상대를 분류하고 대화창 스타일로 시각화합니다.</p>
        </header>

        <!-- 파일 업로드 영역 -->
        <div class="upload-section">
            <label for="pdf-upload" class="upload-btn">📁 PDF 파일 선택하기</label>
            <input type="file" id="pdf-upload" accept=".pdf" style="display: none;">
            <div id="file-name" class="file-name">선택된 파일 없음</div>
        </div>

        <!-- 필터 및 저장 컨트롤 영역 (드롭다운 적용) -->
        <div class="control-section">
            <div class="dropdown-wrapper">
                <label for="speaker-select">대화 상대 선택: </label>
                <select id="speaker-select" class="styled-select">
                    <option value="all">전체 대화</option>
                </select>
            </div>
            <button id="btn-export" class="export-btn" disabled>💾 이미지로 저장</button>
        </div>

        <!-- 대화창 렌더링 영역 -->
        <div class="chat-wrapper">
            <div id="chat-container" class="chat-container">
                <div class="system-message">PDF 파일을 업로드하시면 이곳에 대화창이 생성됩니다.</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
