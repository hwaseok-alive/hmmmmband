<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>BAND 대화 백업기</title>

    <link rel="stylesheet" href="style.css">

    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

    <!-- OCR -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <!-- PNG 저장 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <!-- PDF 저장 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<div class="app">

    <!-- =========================
            HEADER
    ========================== -->

    <header class="header">

        <div>
            <h1>💬 BAND 대화 백업기</h1>
            <p>PDF · 이미지 → 대화 자동 복원</p>
        </div>

        <div class="header-buttons">

            <button id="theme-toggle">
                🌙
            </button>

            <div class="save-dropdown">

                <button id="save-button">
                    💾 저장 ▼
                </button>

                <div id="save-menu" class="save-menu">

                    <button id="save-png">
                        PNG 저장
                    </button>

                    <button id="save-pdf">
                        PDF 저장
                    </button>

                    <button id="copy-image">
                        이미지 복사
                    </button>

                    <button id="copy-html">
                        HTML 복사
                    </button>

                </div>

            </div>

        </div>

    </header>

    <!-- =========================
            MAIN
    ========================== -->

    <main class="main-layout">

        <!-- =====================
              LEFT PANEL
        ====================== -->

        <aside class="sidebar">

            <!-- 파일 -->

            <section class="panel">

                <h3>📄 파일</h3>

                <label class="upload-button" for="pdf-upload">
                    파일 선택
                </label>

                <input
                    type="file"
                    id="pdf-upload"
                    accept=".pdf,.png,.jpg,.jpeg"
                    hidden>

                <button
                    id="cancel-btn"
                    class="danger-button">
                    분석 취소
                </button>

                <div id="file-name">

                    선택된 파일 없음

                </div>

            </section>

            <!-- 화자 -->

            <section class="panel">

                <h3>👤 내 이름</h3>

                <select id="my-speaker">

                    <option>
                        자동 감지
                    </option>

                </select>

                <h3>👥 상대</h3>

                <select id="target-speaker">

                    <option>
                        전체 대화
                    </option>

                </select>

            </section>

            <!-- 프로필 -->

            <section class="panel">

                <h3>🖼 프로필 사진</h3>

                <div class="profile-setting">

                    <label>

                        내 사진

                    </label>

                    <input
                        type="file"
                        id="my-avatar"
                        accept="image/*">

                </div>

                <div class="profile-setting">

                    <label>

                        상대 사진

                    </label>

                    <input
                        type="file"
                        id="target-avatar"
                        accept="image/*">

                </div>

            </section>

            <!-- 옵션 -->

            <section class="panel">

                <h3>⚙ 표시 옵션</h3>

                <label>

                    <input
                        type="checkbox"
                        id="show-name"
                        checked>

                    이름 표시

                </label>

                <label>

                    <input
                        type="checkbox"
                        id="show-profile"
                        checked>

                    프로필 표시

                </label>

                <label>

                    <input
                        type="checkbox"
                        id="show-time"
                        checked>

                    시간 표시

                </label>

                <label>

                    <input
                        type="checkbox"
                        id="show-system">

                    시스템 메시지

                </label>

            </section>

            <!-- OCR -->

            <section class="panel">

                <h3>📊 OCR 진행</h3>

                <div class="progress">

                    <div
                        id="progress-bar">
                    </div>

                </div>

                <div
                    id="progress-text">

                    대기 중

                </div>

            </section>

        </aside>

        <!-- =====================
            RIGHT
        ====================== -->

        <section class="viewer">

            <div class="viewer-toolbar">

                <div id="analysis-result">

                    PDF를 업로드하면
                    화자가 자동 분석됩니다.

                </div>

                <input
                    id="search-box"
                    type="text"
                    placeholder="대화 검색">

            </div>

            <!-- 대화 -->

            <div
                id="chat-wrapper">

                <div
                    id="chat-container">

                    <div class="system-message">

                        PDF 또는 이미지를
                        업로드하세요.

                    </div>

                </div>

            </div>

        </section>

    </main>

</div>

<script src="script.js"></script>

</body>
</html>
