<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>BAND 대화 백업기</title>

    <link rel="stylesheet" href="style.css">

    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

    <!-- OCR -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <!-- html2canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<div class="app">

<!-- =========================================================
HEADER
========================================================= -->

<header class="header">

    <div>

        <h1>💬 BAND 대화 백업기</h1>

        <p>PDF · 이미지 → 메신저 스타일 대화 자동 복원</p>

    </div>

    <div class="header-buttons">

        <button id="theme-toggle">

            🌙

        </button>

        <div class="save-dropdown">

            <button id="save-button">

                💾 저장 ▼

            </button>

            <div
                id="save-menu"
                class="save-menu">

                <button id="save-png">
                    PNG 저장
                </button>

                <button id="save-pdf">
                    PDF 저장
                </button>

                <button id="copy-image">
                    이미지 복사
                </button>

                <button id="copy-html">
                    HTML 복사
                </button>

            </div>

        </div>

    </div>

</header>

<!-- =========================================================
MAIN
========================================================= -->

<div class="main-layout">

<!-- =========================================================
SIDEBAR
========================================================= -->

<aside class="sidebar">

<!-- 파일 -->

<section class="panel">

    <h3>📄 파일 업로드</h3>

    <label
        for="pdf-upload"
        class="upload-button">

        PDF / 이미지 선택

    </label>

    <input
        id="pdf-upload"
        type="file"
        accept=".pdf,.png,.jpg,.jpeg"
        hidden>

    <button
        id="cancel-btn"
        class="danger-button">

        분석 취소

    </button>

    <div id="file-name">

        선택된 파일 없음

    </div>

</section>

<!-- OCR -->

<section class="panel">

    <h3>📊 OCR 진행 상황</h3>

    <div class="progress">

        <div id="progress-bar"></div>

    </div>

    <div id="progress-text">

        대기 중

    </div>

</section>

<!-- 화자 -->

<section class="panel">

    <h3>👤 내 이름</h3>

    <select id="my-speaker">

        <option value="">

            자동 감지

        </option>

    </select>

    <h3 style="margin-top:18px;">

        👥 상대 선택

    </h3>

    <select id="target-speaker">

        <option value="all">

            전체 대화

        </option>

    </select>

</section>

<!-- 프로필 -->

<section class="panel">

    <h3>🖼 프로필</h3>

    <div id="profile-list">

        <!--

        JS가 자동 생성

        <div class="profile-setting">

            <div class="avatar-preview">

                <img>

            </div>

            <div class="profile-info">

                <label>

                    콘스탄틴 하벨

                </label>

                <input
                    type="file">

            </div>

        </div>

        -->

    </div>

</section>

<!-- 옵션 -->

<section class="panel">

    <h3>⚙ 표시 옵션</h3>

    <label>

        <input
            id="show-profile"
            type="checkbox"
            checked>

        프로필 표시

    </label>

    <label>

        <input
            id="show-name"
            type="checkbox"
            checked>

        이름 표시

    </label>

    <label>

        <input
            id="show-time"
            type="checkbox"
            checked>

        시간 표시

    </label>

    <label>

        <input
            id="show-system"
            type="checkbox">

        시스템 메시지 표시

    </label>

</section>

<!-- 여기서 이어짐 -->
    <!-- =========================================================
VIEWER
========================================================= -->

</aside>

<section class="viewer">

    <div class="viewer-toolbar">

        <div id="analysis-result">

            PDF 또는 이미지를 업로드하면
            자동으로 화자를 분석합니다.

        </div>

        <input
            id="search-box"
            type="text"
            placeholder="대화 검색...">

       </div>

    <div id="chat-wrapper">

        <div id="chat-container">

            <div class="system-message">

                PDF 또는 이미지를 업로드하세요.

            </div>

        </div>

    </div>

</section>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
